<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Yapılacaklar Listesi</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <!-- GİRİŞ / KAYIT EKRANI -->
  <div class="app auth-screen" id="auth-screen" hidden>
    <h1>📋 Yapılacaklar</h1>
    <p class="subtitle">Devam etmek için giriş yap veya kayıt ol</p>

    <form id="auth-form" class="auth-form">
      <input
        type="email"
        id="auth-email"
        placeholder="E-posta"
        autocomplete="email"
        required
      />
      <input
        type="password"
        id="auth-password"
        placeholder="Şifre (en az 6 karakter)"
        autocomplete="current-password"
        minlength="6"
        required
      />
      <button type="submit" id="auth-submit">Giriş Yap</button>
    </form>

    <p class="auth-error" id="auth-error"></p>

    <p class="auth-switch">
      <span id="auth-switch-text">Hesabın yok mu?</span>
      <button type="button" id="auth-switch-btn" class="link-btn">Kayıt ol</button>
    </p>
  </div>

  <!-- UYGULAMA -->
  <div class="app" id="app-screen" hidden>
    <div class="topbar">
      <h1>📋 Yapılacaklar</h1>
      <button id="logout-btn" class="logout-btn">Çıkış</button>
    </div>
    <p class="user-email" id="user-email"></p>

    <form id="todo-form" class="todo-form">
      <input
        type="text"
        id="todo-input"
        placeholder="Yeni görev ekle..."
        autocomplete="off"
      />
      <button type="submit">Ekle</button>
    </form>

    <div class="filters">
      <button class="filter-btn active" data-filter="all">Tümü</button>
      <button class="filter-btn" data-filter="active">Aktif</button>
      <button class="filter-btn" data-filter="done">Tamamlanan</button>
    </div>

    <ul id="todo-list" class="todo-list"></ul>

    <div class="footer">
      <span id="count">0 görev</span>
      <button id="clear-done" class="clear-btn">Tamamlananları temizle</button>
    </div>
  </div>

  <script src="config.js"></script>
  <script src="script.js"></script>
</body>
</html>
